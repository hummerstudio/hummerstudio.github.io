<header class="site-header glass">
    <div class="header-inner">
        <a href="{{ site.baseurl | prepend: site.url }}/" class="site-brand">
            <span class="brand-title">{{ site.title }}</span>
        </a>
        <button class="nav-toggle" aria-label="导航菜单">
            <span></span><span></span><span></span>
        </button>
        <nav class="site-nav">
            <ul class="nav-list">
                <li class="nav-item {% if page.url == '/' or page.url == '/index.html' %}active{% endif %}">
                    <a href="{{ site.baseurl | prepend: site.url }}/">首页</a>
                </li>
                {% for section in site.data.nav %}
                <li class="nav-item has-sub">
                    <a href="{{ site.baseurl | prepend: site.url }}/category/#{{ section.slug }}">
                        {{ section.name }}
                        <span class="nav-arrow">▾</span>
                    </a>
                    <ul class="sub-nav">
                        {% for child in section.children %}
                        <li><a href="{{ site.baseurl | prepend: site.url }}/category/#{{ section.slug }}-{{ child.slug }}">{{ child.name }}</a></li>
                        {% endfor %}
                    </ul>
                </li>
                {% endfor %}
                <li class="nav-item {% if page.url contains '/about/' %}active{% endif %}">
                    <a href="{{ site.baseurl | prepend: site.url }}/about/">关于</a>
                </li>
            </ul>
        </nav>
    </div>
</header>
