---
layout: default
---
<article class="page-container">
    <header class="page-header">
        <h1 class="page-title">{{ page.title }}</h1>
    </header>
    <div class="page-content{% unless page.noGlassCard %} glass-card{% endunless %}">
        {{ content }}
    </div>
</article>

{% if page.scripts %}
  {% for script in page.scripts %}
  <script src="{{ '/static/js/' | append: script | prepend: site.baseurl | prepend: site.url }}"></script>
  {% endfor %}
{% endif %}
