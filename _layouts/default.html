<!DOCTYPE html>
<html lang="zh-CN">
{% include head.html %}
<body>
    {% include header.html %}
    <main class="main-content">
        {{ content }}
    </main>
    {% include footer.html %}
    <button class="scroll-top" aria-label="回到顶部" title="回到顶部">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 15 12 9 6 15"/></svg>
    </button>
    <script src="{{ '/static/js/main.js' | prepend: site.baseurl }}"></script>
    {% if page.layout == 'post' %}
    <script src="{{ '/static/js/post.js' | prepend: site.baseurl }}"></script>
    {% endif %}
    {% if page.scripts %}
    {% for script in page.scripts %}
    <script src="{{ '/static/js/' | append: script | prepend: site.baseurl }}"></script>
    {% endfor %}
    {% endif %}
</body>
</html>
