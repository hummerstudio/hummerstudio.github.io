---
layout: default
title: 文章分类
permalink: /category/
---
<article class="page-container">
    <div class="category-page">
        <div class="category-page-header" id="category-header">
            <!-- 由 JS 动态生成分类标题 -->
        </div>
        <div class="post-list" id="category-post-list">
            <!-- 由 JS 动态渲染 -->
        </div>
    </div>
</article>

<script type="application/json" id="nav-data">
{{ site.data.nav | jsonify }}
</script>

<script type="application/json" id="posts-data">
[
  {% for post in site.posts %}
  {
    "title": {{ post.title | jsonify }},
    "url": {{ post.url | prepend: site.baseurl | jsonify }},
    "date": {{ post.date | date: '%Y-%m-%d' | jsonify }},
    "categories": {{ post.categories | jsonify }},
    "excerpt": {{ post.excerpt | strip_html | truncate: 200 | jsonify }}
  }{% unless forloop.last %},{% endunless %}
  {% endfor %}
]
</script>

<script src="{{ '/static/js/category.js' | prepend: site.baseurl }}"></script>
